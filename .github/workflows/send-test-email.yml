name: Enviar e-mail de teste

on:
  workflow_dispatch:
    inputs:
      subject:
        description: Assunto do e-mail
        required: true
        type: string
        default: Teste do Tironi Outreach
      message:
        description: Mensagem do e-mail
        required: true
        type: string
        default: |
          Olá,

          Este é um envio de teste do Tironi Outreach pelo GitHub Actions.

          Se você recebeu esta mensagem, a configuração SMTP está funcionando.

permissions:
  contents: read

concurrency:
  group: tironi-outreach-test-email
  cancel-in-progress: false

jobs:
  send:
    name: Enviar para chatbobo22@gmail.com
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TEST_RECIPIENT: chatbobo22@gmail.com
      TEST_SUBJECT: ${{ inputs.subject }}
      TEST_MESSAGE: ${{ inputs.message }}
      DRY_RUN: "false"
      SMTP_HOST: smtp-relay.brevo.com
      SMTP_PORT: "587"
      SMTP_STARTTLS: "true"
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      OUTREACH_FROM_EMAIL: ${{ secrets.OUTREACH_FROM_EMAIL }}
      OUTREACH_FROM_NAME: ${{ secrets.OUTREACH_FROM_NAME || 'Tironi Tech' }}
      OUTREACH_REPLY_TO: ${{ secrets.OUTREACH_REPLY_TO }}
      UNSUBSCRIBE_SECRET: ${{ secrets.UNSUBSCRIBE_SECRET }}
      PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || 'https://tironi-outreach.vercel.app' }}

    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar o projeto
        run: python -m pip install .

      - name: Validar destinatário e configuração
        run: |
          python - <<'PY'
          import os

          from outreach.config import Settings

          recipient = os.environ["TEST_RECIPIENT"]
          if recipient != "chatbobo22@gmail.com":
              raise RuntimeError("O destinatário de teste não pode ser alterado")

          settings = Settings()
          if settings.dry_run:
              raise RuntimeError("DRY_RUN precisa estar desativado para o teste real")
          settings.validate_smtp()
          print("Configuração válida para um único envio de teste.")
          PY

      - name: Diagnosticar conexão SMTP
        run: |
          python - <<'PY'
          import os
          import smtplib
          import socket
          import ssl

          host = os.environ["SMTP_HOST"]
          port = int(os.environ["SMTP_PORT"])
          username = os.environ["SMTP_USERNAME"]
          password = os.environ["SMTP_PASSWORD"]

          print("=== Configuração sanitizada ===")
          print(f"Servidor: {host}:{port}")
          print(f"STARTTLS: {os.environ['SMTP_STARTTLS']}")
          print(f"Usuário preenchido: {bool(username)}")
          print(f"Formato do usuário Brevo: {username.endswith('@smtp-brevo.com')}")
          print(f"Tamanho do usuário: {len(username)}")
          print(f"Senha preenchida: {bool(password)}")
          print(f"Tamanho da senha: {len(password)}")
          print(f"Senha contém espaços nas extremidades: {password != password.strip()}")

          try:
              addresses = sorted(
                  {
                      item[4][0]
                      for item in socket.getaddrinfo(host, port, type=socket.SOCK_STREAM)
                  }
              )
              print(f"DNS resolvido: {', '.join(addresses)}")
          except OSError as exc:
              raise RuntimeError(f"Falha ao resolver o DNS de {host}: {exc}") from None

          try:
              with smtplib.SMTP(host, port, timeout=30) as smtp:
                  print(f"Conexão TCP estabelecida com: {smtp.sock.getpeername()}")

                  code, response = smtp.ehlo()
                  print(f"EHLO antes do TLS: código {code}")
                  print(f"Extensões anunciadas: {', '.join(sorted(smtp.esmtp_features))}")
                  if code != 250:
                      raise RuntimeError(f"Servidor rejeitou EHLO com código {code}")
                  if not smtp.has_extn("starttls"):
                      raise RuntimeError("Servidor não anunciou suporte a STARTTLS")

                  smtp.starttls(context=ssl.create_default_context())
                  print(f"STARTTLS estabelecido: {smtp.sock.version()}, cifra {smtp.sock.cipher()[0]}")

                  code, response = smtp.ehlo()
                  print(f"EHLO depois do TLS: código {code}")
                  print(f"Métodos de autenticação: {smtp.esmtp_features.get('auth', 'não informado')}")

                  print("Tentando autenticar com as credenciais configuradas...")
                  smtp.login(username, password)
                  print("Autenticação SMTP concluída com sucesso.")
          except smtplib.SMTPAuthenticationError as exc:
              detail = exc.smtp_error.decode(errors="replace")
              print("::error title=Autenticação SMTP rejeitada::"
                    f"A Brevo respondeu {exc.smtp_code}: {detail}")
              print("Verifique se a chave SMTP está ativa, se não é uma API key e se a "
                    "plataforma Transactional está habilitada.")
              raise RuntimeError(
                  f"Autenticação rejeitada pela Brevo ({exc.smtp_code}: {detail})"
              ) from None
          except (smtplib.SMTPException, OSError) as exc:
              raise RuntimeError(
                  f"Falha durante {exc.__class__.__name__}: {exc}"
              ) from None
          PY

      - name: Enviar um e-mail
        run: |
          python - <<'PY'
          import os

          from outreach.config import Settings
          from outreach.providers.base import OutboundEmail
          from outreach.providers.brevo_smtp import BrevoSmtpProvider

          recipient = os.environ["TEST_RECIPIENT"]
          settings = Settings()
          result = BrevoSmtpProvider(settings).send(
              OutboundEmail(
                  message_id=0,
                  to=recipient,
                  subject=os.environ["TEST_SUBJECT"],
                  text=os.environ["TEST_MESSAGE"],
                  unsubscribe_url=f"{settings.public_base_url}/unsubscribe/test",
              )
          )

          if not result.accepted:
              raise RuntimeError(f"Falha no envio SMTP: {result.error}")

          print(f"E-mail aceito pelo SMTP para {recipient}.")
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as summary:
              summary.write("## E-mail de teste aceito pelo SMTP\n")
              summary.write(f"- Destinatário: `{recipient}`\n")
              summary.write(f"- Assunto: {os.environ['TEST_SUBJECT']}\n")
              summary.write("- Resultado: aceito pelo relay SMTP\n")
          PY
