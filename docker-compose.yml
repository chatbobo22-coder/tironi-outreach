services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: cnpj
      POSTGRES_USER: cnpj
      POSTGRES_PASSWORD: cnpj
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cnpj -d cnpj"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: .
    command: ["outreach-worker"]
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:

